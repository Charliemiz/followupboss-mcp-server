name: Build and deploy production

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read
  id-token: write
  packages: write

concurrency:
  group: followupboss-mcp-production
  cancel-in-progress: false

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Run offline checks
        env:
          FUB_API_KEY: fka_ci_contract_test
        run: |
          node --check index.js
          node tests/api-contract.mjs
          node tests/safe-mode.mjs
          node tests/import-overlay.mjs
      - uses: docker/setup-buildx-action@v3
      - name: Validate container build
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          platforms: linux/amd64
          tags: followupboss-mcp:validate
          cache-from: type=gha,scope=followupboss-mcp
          cache-to: type=gha,mode=max,scope=followupboss-mcp

  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: validate
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-buildx-action@v3
      - name: Compute lowercase image name
        id: img
        run: echo "name=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"
      - name: Build and push immutable image (built + cached in GHA)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64
          tags: |
            ${{ steps.img.outputs.name }}:${{ github.sha }}
            ${{ steps.img.outputs.name }}:latest
          cache-from: type=gha,scope=followupboss-mcp
          cache-to: type=gha,mode=max,scope=followupboss-mcp
          provenance: true
          sbom: true
      - name: Sign in to Azure with GitHub OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}
      - name: Deploy production revision
        run: |
          az containerapp update \
            --resource-group "${{ vars.AZURE_RESOURCE_GROUP }}" \
            --name "${{ vars.CONTAINER_APP_NAME }}" \
            --image "${{ steps.img.outputs.name }}:${{ github.sha }}" \
            --min-replicas 1 \
            --max-replicas 1
      - name: Verify health
        run: |
          FQDN="$(az containerapp show \
            --resource-group "${{ vars.AZURE_RESOURCE_GROUP }}" \
            --name "${{ vars.CONTAINER_APP_NAME }}" \
            --query properties.configuration.ingress.fqdn \
            --output tsv)"
          curl --fail --retry 12 --retry-delay 5 --retry-all-errors "https://${FQDN}/health"
